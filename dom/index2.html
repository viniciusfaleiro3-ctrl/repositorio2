<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Livraria - Aula DOM</title>
  <link rel="stylesheet" href="style2.css">
</head>
<body>
  <main>
    <section id="catalogo">
      <h2>Catálogo de Livros</h2>
      <div id="lista-livros"></div>
    </section>

    <aside id="carrinho">
      <h3>Meu Carrinho</h3>
      <ul id="itens-carrinho"></ul>
      <p>Total: R$ <span id="valor-total">0.00</span></p>
      <button id="btn-limpar" onclick="esvaziarCarrinho()">Esvaziar Carrinho</button>
    </aside>
  </main>

  <script src="script.js"></script>
</body>
</html>
